<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 760" preserveAspectRatio="none">
  <!-- Procedural sheet of paper, photographed-under-studio-light recipe, five
       layers bottom-to-top:
         1. fibre   — fine fractal-noise grain relit by a soft distant light
         2. buckle  — very-low-frequency undulation relit the same way, so the
                      sheet reads as gently warped from being handled, not flat
         3. flecks  — sparse darker pulp specks (thresholded turbulence)
         4. crease  — one pressed fold (shadow gathering into it, light kissing
                      the far side), slightly off-horizontal like a real fold
         5. light + vignette — top-left pool and a faint warm edge fall-off
       Swap this file for a real scanned-paper asset to upgrade the look. -->
  <defs>
    <filter id="fibre" x="0" y="0" width="100%" height="100%">
      <feTurbulence type="fractalNoise" baseFrequency="0.016 0.12" numOctaves="3" seed="7" stitchTiles="stitch" result="n"/>
      <feDiffuseLighting in="n" surfaceScale="1.2" diffuseConstant="1.05" lighting-color="#FBF6EC" result="l">
        <feDistantLight azimuth="235" elevation="60"/>
      </feDiffuseLighting>
      <feFlood flood-color="#F3EBDB" result="t"/>
      <feBlend in="l" in2="t" mode="multiply"/>
    </filter>
    <filter id="buckle" x="-10%" y="-10%" width="120%" height="120%">
      <feTurbulence type="fractalNoise" baseFrequency="0.0045 0.006" numOctaves="2" seed="11" result="u"/>
      <feDiffuseLighting in="u" surfaceScale="3.2" diffuseConstant="1.1" lighting-color="#ffffff">
        <feDistantLight azimuth="235" elevation="62"/>
      </feDiffuseLighting>
    </filter>
    <filter id="flecks" x="0" y="0" width="100%" height="100%">
      <feTurbulence type="fractalNoise" baseFrequency="0.5" numOctaves="2" seed="19" result="f"/>
      <feColorMatrix in="f" type="matrix" values="0 0 0 0 0.42  0 0 0 0 0.36  0 0 0 0 0.26  0 0 0 14 -12.7"/>
    </filter>
    <linearGradient id="creaseShadow" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#4A3B24" stop-opacity="0"/>
      <stop offset="100%" stop-color="#4A3B24" stop-opacity="0.15"/>
    </linearGradient>
    <linearGradient id="creaseLight" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>
    <radialGradient id="light" cx="28%" cy="18%" r="86%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.42"/>
      <stop offset="60%" stop-color="#ffffff" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="vignette" cx="50%" cy="48%" r="74%">
      <stop offset="66%" stop-color="#000000" stop-opacity="0"/>
      <stop offset="100%" stop-color="#2a2115" stop-opacity="0.14"/>
    </radialGradient>
  </defs>
  <rect width="600" height="760" filter="url(#fibre)"/>
  <rect width="600" height="760" filter="url(#buckle)" opacity="0.45" style="mix-blend-mode:soft-light"/>
  <rect width="600" height="760" filter="url(#flecks)" opacity="0.5"/>
  <g transform="rotate(-1.4 300 468)">
    <rect x="-50" y="450" width="700" height="18" fill="url(#creaseShadow)" style="mix-blend-mode:multiply"/>
    <rect x="-50" y="468" width="700" height="10" fill="url(#creaseLight)" style="mix-blend-mode:soft-light"/>
  </g>
  <rect width="600" height="760" fill="url(#light)"/>
  <rect width="600" height="760" fill="url(#vignette)"/>
</svg>
